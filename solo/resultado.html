<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>EnerQuest - Resultado</title>
    <link rel="stylesheet" href="../assets/css/global/global.css" />
    <link rel="stylesheet" href="../assets/css/pages/solo/resultado.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <a href="quiz.html" class="voltar">✖</a>

    <header class="topo">
      <img src="../assets/img/logo2UPX.png" alt="EnerQuest" class="logo" />
    </header>

    <main class="container">
      <!-- TÍTULO ÉPICO -->
      <h1 id="epic-titulo" class="epic-titulo vitoria">SISTEMA ILUMINADO!</h1>
      <p id="epic-sub" class="epic-sub">Parabéns, Operador — missão cumprida</p>

      <!-- LAYOUT PRINCIPAL -->
      <div class="main-layout">
        <!-- CARD ESQUERDO: ícone + score + vidas -->
        <div class="card-score">
          <div class="icone-res" id="icone-res">🏆</div>
          <span class="score-label">Pontuação Final</span>
          <span class="score-valor" id="pontos">0</span>
          <span class="score-pts">PONTOS</span>
          <div class="divider"></div>
          <span class="vidas-label">Vidas Restantes</span>
          <span class="vidas-icons" id="vidas-icons">⚡</span>
        </div>

        <!-- CARD DIREITO: estatísticas empilhadas -->
        <div class="card-stats">
          <div class="stats-header">ESTATÍSTICAS</div>

          <div class="stat-row">
            <span class="stat-nome">Acertos</span>
            <span class="stat-val verde" id="stat-acertos">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-nome">Erros</span>
            <span class="stat-val vermelho" id="stat-erros">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-nome">Total</span>
            <span class="stat-val neutro" id="stat-total">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-nome">Score</span>
            <span class="stat-val dourado" id="stat-score">0</span>
          </div>
        </div>
      </div>

      <!-- BOTÕES -->
      <div class="res-botoes">
        <a href="quiz.html" class="btn-primario">⟳ JOGAR NOVAMENTE</a>
        <a href="../modo.html" class="btn-secundario">← ESCOLHER MODO</a>
      </div>
    </main>

    <script src="../assets/js/pages/solo/resultado.js"></script>
  </body>
</html>
