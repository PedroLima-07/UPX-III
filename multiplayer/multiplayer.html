<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>EnerQuest - Multiplayer</title>

    <!-- CSS -->
    <link
      rel="stylesheet"
      href="../assets/css/pages/multiplayer/multiplayer.css"
    />
  </head>

  <body>
    <!-- BOTÃO VOLTAR -->
    <a href="../modo.html" class="btn-voltar">
      ✖
    </a>

    <!-- TOPO -->
    <header class="topo">
      <img
        src="../assets/img/logo2UPX.png"
        alt="EnerQuest"
        class="logo"
      />
    </header>

    <!-- CONTAINER -->
    <main class="game">
      <!-- HUD -->
      <div class="hud-container">
        <div class="score-box">
          SCORE:
          <span id="score-valor">0</span>
        </div>

        <div
          class="vidas-box"
          id="vidas-box"
        >
          ⚡ ⚡ ⚡
        </div>
      </div>

      <!-- LOGIN -->
      <section
        id="login-area"
        class="login-area"
      >
        <h2>MULTIPLAYER LOCAL</h2>

        <input
          type="text"
          id="nomeJogador1"
          placeholder="Jogador 1"
        />

        <input
          type="text"
          id="nomeJogador2"
          placeholder="Jogador 2"
        />

        <button
          class="btn-entrar"
          onclick="entrarJogo()"
        >
          INICIAR
        </button>
      </section>

      <!-- QUIZ -->
      <section class="quiz-area">
        <div
          id="conteudo-jogo"
          class="hidden"
        >
          <!-- JOGADOR -->
          <h2 id="jogador-da-vez"></h2>

          <!-- PROGRESSO -->
          <div class="progresso-wrapper">
            <div class="progresso-container">
              <div
                id="barra-progresso"
                class="barra-progresso"
              ></div>
            </div>

            <div
              id="contador-pergunta"
              class="contador-pergunta"
            >
              1/3
            </div>
          </div>

          <!-- PERGUNTA -->
          <div class="pergunta-container">
            <div
              id="texto-pergunta"
              class="pergunta-nova"
            ></div>
          </div>

          <!-- RESPOSTAS -->
          <div class="respostas-lista">
            <button class="btn-resposta-novo">
              <span class="texto-opcao"></span>
            </button>

            <button class="btn-resposta-novo">
              <span class="texto-opcao"></span>
            </button>

            <button class="btn-resposta-novo">
              <span class="texto-opcao"></span>
            </button>

            <button class="btn-resposta-novo">
              <span class="texto-opcao"></span>
            </button>
          </div>
        </div>
      </section>
    </main>

    <!-- FEEDBACK -->
    <div
      id="feedback"
      class="feedback hidden"
    >
      <div id="feedback-texto"></div>
    </div>

    <!-- JS -->
    <script src="../assets/js/pages/solo/Banco-perguntas.js"></script>

    <script src="../assets/js/pages/multiplayer/multiplayer.js"></script>
  </body>
</html>
