<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>EnerQuest - Multiplayer</title>

    <link
      rel="stylesheet"
      href="../assets/css/pages/multiplayer/multiplayer.css"
    />
  </head>

  <body>
    <a href="../modo.html" class="btn-voltar">
      ✖
    </a>

    <!-- <header class="topo">
      <img
        src="../assets/img/logo2UPX.png"
        alt="EnerQuest"
        class="logo"
      />
    </header> -->

    <main class="game">

      <div class="hud-container">
        <div class="score-box placar-multiplayer">

          <div>
            <span id="placar-jogador1">0</span>
          </div>

          <div>
            <span id="placar-jogador2">0</span>
          </div>

        </div>
      </div>

      <section
        id="login-area"
        class="login-area"
      >
        <h2>MULTIPLAYER LOCAL</h2>

        <input
          type="text"
          id="nomeJogador1"
          placeholder="Jogador 1"
        />

        <input
          type="text"
          id="nomeJogador2"
          placeholder="Jogador 2"
        />

        <div class="teclas-info">

          <p>
            Jogador 1 aperta tecla
            <strong>A</strong>
          </p>

          <p>
            Jogador 2 aperta tecla
            <strong>L</strong>
          </p>

        </div>

        <button
          class="btn-entrar"
          onclick="entrarJogo()"
        >
          INICIAR
        </button>
      </section>

      <section class="quiz-area">

        <div
          id="conteudo-jogo"
          class="hidden"
        >

          <h2 id="jogador-da-vez">
            Apertem para responder!
          </h2>

          <div class="status-buzzer">

            <span id="status-buzzer">
              ⏳ Esperando alguém apertar...
            </span>

          </div>

          <div class="progresso-wrapper">

            <div class="progresso-container">

              <div
                id="barra-progresso"
                class="barra-progresso"
              ></div>

            </div>

            <div
              id="contador-pergunta"
              class="contador-pergunta"
            >
              1/3
            </div>

          </div>

          <div class="pergunta-container">

            <div
              id="texto-pergunta"
              class="pergunta-nova"
            ></div>

          </div>

          <div class="respostas-lista">

            <button
              class="btn-resposta-novo"
              disabled
            >
              <span class="texto-opcao"></span>
            </button>

            <button
              class="btn-resposta-novo"
              disabled
            >
              <span class="texto-opcao"></span>
            </button>

            <button
              class="btn-resposta-novo"
              disabled
            >
              <span class="texto-opcao"></span>
            </button>

            <button
              class="btn-resposta-novo"
              disabled
            >
              <span class="texto-opcao"></span>
            </button>

          </div>

        </div>

      </section>

    </main>

    <div
      id="feedback"
      class="feedback hidden"
    >
      <div id="feedback-texto"></div>
    </div>

    <script src="../assets/js/pages/solo/Banco-perguntas.js"></script>

    <script src="../assets/js/pages/multiplayer/multiplayer.js"></script>
  </body>
</html>
